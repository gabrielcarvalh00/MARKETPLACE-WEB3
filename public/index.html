<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diciplinas</title>
</head>

<body>
    <form id="formAluno">
        <label for="NomeAluno">NomeAluno</label>
        <input type="text" name="NomeAluno" id="NomeAluno"><br>
        <button type="submit">ENVIAR</button>
    </form>
    <script>
        /* Parte do input HTML */
        document.getElementById('formAluno').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
               nome: document.getElementById('NomeAluno').value
            };
       
            try {
                // Envia os dados para a rota /insert do servidor
                const response = await fetch('/insert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
    
                if (response.ok) {
                    const result = await response.text(); // Resposta do servidor
                    alert(result); // Exibe a resposta do servidor (sucesso)
                } else {
                    alert('Erro ao enviar dados'); // Caso ocorra erro na resposta
                }
            } catch (error) {
                console.error('Erro ao enviar dados:', error);
                alert('Erro ao enviar dados');
            }
        });
    </script>

   
</body>
</html>
